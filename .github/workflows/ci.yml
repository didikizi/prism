name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      # Only prism's own packages — ./fixture/... holds deliberately-failing
      # sample tests used to generate the demo, and would (intentionally) be red.
      - name: test
        run: go test ./internal/...
